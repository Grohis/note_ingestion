<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; font-family:sans-serif; background:#f5f6f7; }

        button {
            padding:10px 14px;
            border-radius:8px;
            border:none;
            background:#3498db;
            color:white;
        }

        #deleteBtn { background:#e74c3c; }

        #topBar {
            display:flex;
            justify-content:space-between;
            padding:10px;
        }

        #container {
            display:flex;
            flex-direction:column;
            padding:10px;
        }

        #treeContainer {
            position:fixed;
            top:0;
            left:-260px;
            width:250px;
            height:100%;
            background:white;
            padding:10px;
            transition:0.3s;
            z-index:1000;
            overflow:auto;
        }

        #treeContainer.open { left:0; }

        #overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.3);
            display:none;
            z-index:900;
        }

        #overlay.open { display:block; }

        #noteContent {
            background:white;
            border-radius:10px;
            padding:12px;
            min-height:200px;
            line-height:1.5;
        }

        #noteEditor {
            display:none;
            flex-direction:column;
            gap:10px;
        }

        textarea { width:100%; height:200px; font-size:16px; }
        input { width:100%; padding:8px; margin-top:6px; font-size:16px; }

        #modal, #deleteModal {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.5);
            justify-content:center;
            align-items:center;
        }

        #modalContent, #deleteModal div {
            background:white;
            padding:20px;
            width:90%;
            max-width:400px;
            border-radius:10px;
        }

        #toast {
            display:none;
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            background:#2ecc71;
            color:white;
            padding:10px 20px;
            border-radius:20px;
        }

        @media (min-width:768px) {
            #container { flex-direction:row; }
            #treeContainer { position:static; left:0; height:auto; }
            #overlay { display:none!important; }
        }
    </style>
</head>

<body>

<div id="topBar">
    <button onclick="toggleTree()">☰</button>
    <h3>Мои заметки</h3>
    <button onclick="showModal()">➕</button>
</div>

<div id="overlay" onclick="closeTree()"></div>

<div id="container">

    <div id="treeContainer">
        <h4>Топики</h4>
        <ul id="treeList"></ul>
    </div>

    <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
        <div id="noteContent">Выберите заметку</div>

        <div id="noteEditor">
            <textarea id="editText"></textarea>
            <button onclick="saveEdit()">Сохранить</button>
            <button onclick="cancelEdit()">Отмена</button>
        </div>

        <div>
            <button id="editBtn" style="display:none" onclick="startEdit()">Редактировать</button>
            <button id="deleteBtn" style="display:none" onclick="deleteNote()">Удалить</button>
        </div>
    </div>

</div>

<!-- Modal -->
<div id="modal">
    <div id="modalContent">
        <h3>Новая заметка</h3>
        <input id="topic" list="topics" placeholder="topic">
        <datalist id="topics"></datalist>
        <input id="title" placeholder="title">
        <textarea id="text" placeholder="text"></textarea>

        <button onclick="save()">Сохранить</button>
        <button onclick="hideModal()">Отмена</button>
    </div>
</div>

<!-- Delete modal -->
<div id="deleteModal">
    <div>
        <p>Введите "удалить"</p>
        <input id="deleteConfirmInput">
        <button onclick="confirmDelete()">Подтвердить</button>
        <button onclick="hideDeleteModal()">Отмена</button>
    </div>
</div>

<div id="toast">Готово ✅</div>

<script>
    const headers = { "X-API-KEY": "123" };

    let user, currentTopic, currentFile;

    /* ===== Sidebar ===== */
    function toggleTree() {
        treeContainer.classList.toggle("open");
        overlay.classList.toggle("open");
    }

    function closeTree() {
        treeContainer.classList.remove("open");
        overlay.classList.remove("open");
    }

    /* ===== Modal ===== */
    function showModal() {
        // ✅ очистка формы при каждом открытии
        topic.value = "";
        title.value = "";
        text.value = "";

        modal.style.display = "flex";
    }

    function hideModal() {
        modal.style.display = "none";
    }

    function hideDeleteModal() {
        deleteModal.style.display = "none";
    }

    /* ===== Toast ===== */
    function showToast() {
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2000);
    }

    /* ===== Init ===== */
    window.onload = () => {
        user = localStorage.getItem("user") || prompt("Введите имя:");
        localStorage.setItem("user", user);

        fetch('/user/set?user=' + user, { method: 'POST' });
        loadTopics();
    };

    /* ===== Topics ===== */
    function loadTopics() {
        fetch('/notes/tree?user=' + user, { headers })
            .then(r => r.json())
            .then(tree => {
                treeList.innerHTML = "";
                topics.innerHTML = "";

                Object.entries(tree).forEach(([topicName, files]) => {

                    const option = document.createElement("option");
                    option.value = topicName;
                    topics.appendChild(option);

                    const li = document.createElement("li");
                    li.innerText = topicName;

                    const ul = document.createElement("ul");

                    files.forEach(file => {
                        const f = document.createElement("li");
                        f.innerText = file;

                        f.onclick = () => {
                            loadNote(topicName, file);
                            closeTree();
                        };

                        ul.appendChild(f);
                    });

                    li.appendChild(ul);
                    treeList.appendChild(li);
                });
            });
    }

    /* ===== Helpers ===== */
    function extractText(content) {
        const parts = content.split("\n---\n");
        return parts.length >= 2 ? parts.slice(1).join("\n---\n").trim() : content;
    }

    function extractMeta(content) {
        const match = content.match(/^---[\s\S]*?---/);
        return match ? match[0] + "\n\n" : "";
    }

    /* ===== Load note ===== */
    function loadNote(topic, file) {
        fetch(`/notes/content?user=${user}&topic=${topic}&file=${file}`, { headers })
            .then(r => r.text())
            .then(full => {
                noteContent.innerText = extractText(full); // ✅ без metadata

                currentTopic = topic;
                currentFile = file;

                editBtn.style.display = "inline-block";
                deleteBtn.style.display = "inline-block";
            });
    }

    /* ===== Create ===== */
    function save() {
        fetch("/notes", {
            method: "POST",
            headers: { "Content-Type": "application/json", ...headers },
            body: JSON.stringify({
                user,
                topic: topic.value,
                title: title.value,
                text: text.value
            })
        }).then(() => {
            showToast();
            hideModal();
            loadTopics();
        });
    }

    /* ===== Edit ===== */
    function startEdit() {
        editText.value = noteContent.innerText;

        noteEditor.style.display = "flex";
        editBtn.style.display = "none";
        deleteBtn.style.display = "none";
    }

    function cancelEdit() {
        noteEditor.style.display = "none";
        editBtn.style.display = "inline-block";
        deleteBtn.style.display = "inline-block";
    }

    function saveEdit() {
        const updatedText = editText.value;

        fetch(`/notes/update?user=${user}&topic=${currentTopic}&file=${currentFile}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain", ...headers },
            body: updatedText
        }).then(() => {
            noteContent.innerText = updatedText; // ✅ только текст
            cancelEdit();
            showToast();
        });
    }

    /* ===== Delete ===== */
    function deleteNote() {
        deleteModal.style.display = "flex";
    }

    function confirmDelete() {
        if (deleteConfirmInput.value !== "удалить") return;

        fetch(`/notes/delete?user=${user}&topic=${currentTopic}&file=${currentFile}`, {
            method: "DELETE",
            headers: headers
        }).then(() => {

            // ✅ полный reset UI
            noteContent.innerText = "Выберите заметку";
            editBtn.style.display = "none";
            deleteBtn.style.display = "none";
            noteEditor.style.display = "none";

            currentTopic = null;
            currentFile = null;

            hideDeleteModal();
            showToast();
            loadTopics();
        });
    }
</script>

</body>
</html>
