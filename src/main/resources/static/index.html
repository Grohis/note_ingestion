<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #container { display: flex; gap: 20px; }

        /* Левая колонка: дерево топиков */
        #treeContainer {
            width: 250px;
            border-right: 1px solid #ccc;
            padding-right: 10px;
        }
        #treeContainer ul { list-style-type: none; padding-left: 20px; }
        #treeContainer li { cursor: pointer; margin: 3px 0; }
        #treeContainer li:hover { text-decoration: underline; }

        /* Средняя колонка: содержимое и редактирование */
        #noteContentContainer {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #noteContent {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 300px;
            white-space: pre-wrap;
            overflow: auto;
        }
        #noteEditor {
            display: none;
            flex-direction: column;
        }
        #noteEditor textarea {
            width: 100%;
            height: 250px;
        }

        /* Модальное окно для добавления новой заметки */
        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        #modalContent {
            background: white;
            padding: 20px;
            width: 400px;
            border-radius: 6px;
        }

        /* Модальное окно для подтверждения удаления */
        #deleteModal {
            display:none;
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.5);
            justify-content:center; align-items:center;
        }
        #deleteModal div {
            background:white; padding:20px; border-radius:6px; width:300px;
        }

        /* Кнопки */
        button { margin-top: 5px; }
        #deleteBtn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            margin-left:5px;
        }

        /* Toast уведомление */
        #toast { display:none; background: lightgreen; padding:10px; margin-top:10px; }
    </style>
</head>
<body>

<h2>Мои заметки</h2>
<div id="container">

    <!-- Левая колонка: дерево топиков -->
    <div id="treeContainer">
        <h3>Дерево топиков</h3>
        <button onclick="showModal()">Добавить заметку ➕</button>
        <ul id="treeList"></ul>
    </div>

    <!-- Средняя колонка: содержимое и редактирование -->
    <div id="noteContentContainer">
        <h3>Содержимое заметки</h3>
        <pre id="noteContent">Выберите файл, чтобы увидеть заметку</pre>

        <!-- Редактор -->
        <div id="noteEditor">
            <textarea id="editText"></textarea>
            <button onclick="saveEdit()">Сохранить изменения</button>
            <button onclick="cancelEdit()">Отмена</button>
        </div>

        <!-- Кнопки редактирования и удаления -->
        <button id="editBtn" style="display:none" onclick="startEdit()">Редактировать</button>
        <button id="deleteBtn" style="display:none" onclick="deleteNote()">Удалить</button>
    </div>

</div>

<!-- Модальное окно добавления новой заметки -->
<div id="modal">
    <div id="modalContent">
        <h3>Добавить заметку</h3>
        <input id="topic" list="topics" placeholder="topic"><br><br>
        <input id="title" placeholder="title"><br><br>
        <datalist id="topics"></datalist>
        <textarea id="text" rows="5" cols="40" placeholder="text"></textarea><br><br>
        <button onclick="save()">Сохранить</button>
        <button onclick="hideModal()">Отмена</button>
        <div id="toast">Сохранено ✅</div>
    </div>
</div>

<!-- Модальное окно подтверждения удаления -->
<div id="deleteModal">
    <div>
        <p>Точно удалить? Введите "удалить" для подтверждения:</p>
        <input id="deleteConfirmInput" type="text" placeholder="Введите 'удалить'">
        <br><br>
        <button onclick="confirmDelete()">Подтвердить</button>
        <button onclick="hideDeleteModal()">Отмена</button>
    </div>
</div>

<script>
    const headers = { "X-API-KEY": "123" };
    let user = null;
    let currentTopic = null;
    let currentFile = null;

    // === INIT ===
    window.onload = () => {
        user = localStorage.getItem("user");
        if (!user) {
            user = prompt("Введите имя пользователя:");
            localStorage.setItem("user", user);
        }

        fetch('/user/set?user=' + encodeURIComponent(user), { method: 'POST' })
            .then(r => r.text())
            .then(console.log);

        loadTopics();
    };

    // === Модальные окна ===
    function showModal() { document.getElementById("modal").style.display = "flex"; }
    function hideModal() {
        document.getElementById("modal").style.display = "none";
        document.getElementById("topic").value = "";
        document.getElementById("title").value = "";
        document.getElementById("text").value = "";
    }
    function hideDeleteModal() {
        document.getElementById("deleteModal").style.display = "none";
        document.getElementById("deleteConfirmInput").value = "";
    }

    // === Toast ===
    function showToast() {
        const toast = document.getElementById("toast");
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2000);
    }

    // === Сохранение новой заметки ===
    function save() {
        const topic = document.getElementById("topic").value;
        const title = document.getElementById("title").value;
        const text = document.getElementById("text").value;

        if (!topic || !title || !text) { alert("Все поля должны быть заполнены!"); return; }

        fetch("/notes", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-API-KEY": "123" },
            body: JSON.stringify({ user, topic, title, text })
        })
        .then(res => res.text())
        .then(() => {
            showToast();
            hideModal();
            loadTopics();
        })
        .catch(err => console.error(err));
    }

    // === Загрузка дерева топиков + файлов ===
    function loadTopics() {
        fetch('/notes/tree?user=' + user, { headers })
            .then(r => r.json())
            .then(tree => {
                const treeList = document.getElementById("treeList");
                treeList.innerHTML = "";

                const datalist = document.getElementById("topics");
                datalist.innerHTML = "";

                Object.entries(tree).forEach(([topic, files]) => {
                    const option = document.createElement("option");
                    option.value = topic;
                    datalist.appendChild(option);

                    const liTopic = document.createElement("li");
                    liTopic.textContent = topic;

                    const ulFiles = document.createElement("ul");
                    files.forEach(file => {
                        const liFile = document.createElement("li");
                        liFile.textContent = file;
                        liFile.onclick = () => loadNote(topic, file);
                        ulFiles.appendChild(liFile);
                    });

                    liTopic.appendChild(ulFiles);
                    treeList.appendChild(liTopic);
                });
            });
    }

    // === Загрузка содержимого файла ===
    function loadNote(topic, file) {
        fetch(`/notes/content?user=${user}&topic=${encodeURIComponent(topic)}&file=${encodeURIComponent(file)}`, { headers })
            .then(res => res.text())
            .then(text => {
                document.getElementById("noteContent").innerText = text;
                currentTopic = topic;
                currentFile = file;

                document.getElementById("editBtn").style.display = "inline-block";
                document.getElementById("deleteBtn").style.display = "inline-block";
                document.getElementById("noteEditor").style.display = "none";
            })
            .catch(err => console.error(err));
    }

    // === РЕДАКТИРОВАНИЕ ===
function startEdit() {
    const content = document.getElementById("noteContent").innerText;

    // убираем metadata (всё до первого пустого ряда после "---")
    const parts = content.split("\n---\n");
    let textOnly = content;
    if (parts.length >= 2) {
        // после второго "---" идет текст
        textOnly = parts.slice(1).join("\n---\n").trim();
    }

    document.getElementById("editText").value = textOnly;
    document.getElementById("noteEditor").style.display = "flex";

    // скрываем кнопки редактирования и удаления
    document.getElementById("editBtn").style.display = "none";
    document.getElementById("deleteBtn").style.display = "none";
}

function saveEdit() {
    const updatedText = document.getElementById("editText").value;
    if (!updatedText) { alert("Текст заметки пустой!"); return; }

    fetch(`/notes/update?user=${user}&topic=${encodeURIComponent(currentTopic)}&file=${encodeURIComponent(currentFile)}`, {
        method: "POST",
        headers: { "Content-Type": "text/plain", "X-API-KEY": "123" },
        body: updatedText
    })
    .then(res => res.text())
    .then(() => {
        // при отображении добавляем старый metadata обратно
        const content = document.getElementById("noteContent").innerText;
        const metaMatch = content.match(/^---[\s\S]*?---/);
        let meta = metaMatch ? metaMatch[0] + "\n\n" : "";
        document.getElementById("noteContent").innerText = meta + updatedText;

        document.getElementById("noteEditor").style.display = "none";
        document.getElementById("editBtn").style.display = "inline-block";
        document.getElementById("deleteBtn").style.display = "inline-block";

        showToast();
        loadTopics();
    })
    .catch(err => console.error(err));
}

    // === Удаление ===
    function deleteNote() {
        document.getElementById("deleteModal").style.display = "flex";
    }
    function confirmDelete() {
        const val = document.getElementById("deleteConfirmInput").value.trim();
        if (val.toLowerCase() !== "удалить") { alert("Неверно! Введите 'удалить'"); return; }

        fetch(`/notes/delete?user=${user}&topic=${encodeURIComponent(currentTopic)}&file=${encodeURIComponent(currentFile)}`, {
            method: "DELETE",
            headers: headers
        })
        .then(res => res.text())
        .then(() => {
            document.getElementById("noteContent").innerText = "Выберите файл, чтобы увидеть заметку";
            document.getElementById("editBtn").style.display = "none";
            document.getElementById("deleteBtn").style.display = "none";
            hideDeleteModal();
            showToast();
            loadTopics();
        })
        .catch(err => console.error(err));
    }
</script>

</body>
</html>
