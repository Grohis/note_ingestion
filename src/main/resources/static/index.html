<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; font-family:sans-serif; background:#f5f6f7; }

        button {
            padding:10px;
            border:none;
            border-radius:8px;
            background:#3498db;
            color:white;
            margin:2px;
            cursor:pointer;
        }

        #app { display:flex; height:100vh; }

        #sidebar {
            width:200px;
            background:#2c3e50;
            color:white;
            display:flex;
            flex-direction:column;
            padding:10px;
        }

        #sidebar button {
            background:transparent;
            border:none;
            color:white;
            text-align:left;
        }

        #content { flex:1; padding:10px; }

        #notesLayout { display:flex; height:100%; }

        #treePanel {
            width:250px;
            background:white;
            border-right:1px solid #ddd;
            overflow:auto;
        }

        #treePanel li { padding:5px; cursor:pointer; }
        #treePanel li:hover { background:#eee; }

        #notePanel { flex:1; padding:10px; }

        #noteHeader {
            display:flex;
            justify-content:space-between;
            margin-bottom:10px;
        }

        #noteContent {
            background:white;
            padding:12px;
            border-radius:10px;
            min-height:200px;
            white-space:pre-wrap;
        }

        #noteEditor { display:none; flex-direction:column; }

        textarea {
            width:100%;
            min-height:100px;
            resize:none;
            box-sizing:border-box;
        }

        #modal, #deleteModal {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.5);
            justify-content:center;
            align-items:center;
        }

        #modalContent, #deleteModal div {
            background:white;
            padding:20px;
            width:90%;
            max-width:400px;
            border-radius:10px;
        }

        #toast {
            display:none;
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            background:#2ecc71;
            color:white;
            padding:10px;
            border-radius:20px;
        }
    </style>
</head>

<body>

<div id="app">

    <div id="sidebar">
        <button onclick="showPage('home')">🏠</button>
        <button onclick="showPage('notes')">📝</button>
        <button onclick="showPage('tasks')">✅</button>
        <button onclick="showModal()">➕ Новая</button>
    </div>

    <div id="modal">
        <div id="modalContent">
            <h3>Новая заметка</h3>
            <input id="topic" list="topics" placeholder="topic">
            <datalist id="topics"></datalist>
            <input id="title" placeholder="title">
            <input id="tags" placeholder="tags">
            <textarea id="text"></textarea>
            <button onclick="save()">Сохранить</button>
            <button onclick="hideModal()">Отмена</button>
        </div>
    </div>

    <div id="content">

        <div id="homePage" class="page">
            <h2>Главная</h2>
        </div>

        <div id="notesPage" class="page" style="display:none">

            <div id="notesLayout">

                <div id="treePanel">
                    <h4>Топики</h4>
                    <ul id="treeList"></ul>
                </div>

                <div id="notePanel">

                    <div id="noteHeader">
                        <span id="modeLabel">👁</span>

                        <div>
                            <button onclick="startEdit()">✏️</button>
<!--                            <button onclick="toggleSettings(event)">⚙️</button>-->
                        </div>

                        <div style="position:relative;">
                            <button onclick="toggleSettings(event)">⚙️</button>
                            <div id="settingsMenu" style="display:none; position:absolute; right:0; background:white; border:1px solid #ddd; border-radius:8px;">
                                <button onclick="renameCurrentNote()">Переименовать</button>
                                <button onclick="renameTopic()">Переименовать папку</button>
                                <button onclick="deleteNote()">Удалить</button>
                            </div>
                        </div>
                    </div>

                    <div id="noteContent">Выберите заметку</div>

                    <div id="noteEditor">
                        <textarea id="editText"></textarea>
                        <button onclick="saveEdit()">Сохранить</button>
                        <button onclick="cancelEdit()">Отмена</button>
                    </div>

                </div>
            </div>
        </div>

        <div id="tasksPage" class="page" style="display:none">
            <h2>Задачи</h2>
        </div>

    </div>
</div>

<div id="deleteModal">
    <div>
        <p>Напиши "удалить"</p>
        <input id="deleteConfirmInput">
        <button onclick="confirmDelete()">OK</button>
    </div>
</div>

<div id="toast">OK</div>

<script>
    const api = (url, options = {}) =>
        fetch(url, {
            ...options,
            headers: {
                "X-API-KEY": "123",
                ...(options.headers || {})
            }
        }).then(r => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r;
        });

    let user, currentTopic, currentFile, rawNote, currentMeta

    window.onload = () => {
        user = localStorage.getItem("user") || prompt("Введите имя:");
        localStorage.setItem("user", user);
        api('/user/set?user=' + user, { method: 'POST' });
        loadTopics();
    };

    function loadTopics() {
        api('/notes/tree?user=' + user)
            .then(r => r.json())
            .then(tree => {
                treeList.innerHTML = "";
                topics.innerHTML = "";

                Object.entries(tree).forEach(([topicName, files]) => {

                    let opt = document.createElement("option");
                    opt.value = topicName;
                    topics.appendChild(opt);

                    let li = document.createElement("li");
                    li.innerText = "📁 " + topicName;

                    let ul = document.createElement("ul");

                    files.forEach(file => {
                        let f = document.createElement("li");
                        f.innerText = "📄 " + file;
                        f.onclick = () => loadNote(topicName, file);
                        ul.appendChild(f);
                    });

                    li.appendChild(ul);
                    treeList.appendChild(li);
                });
            });
    }

    function loadNote(topic, file) {
        api(`/notes/content?user=${user}&topic=${topic}&file=${file}`)
            .then(r => r.text())
            .then(text => {
                rawNote = text;

                const parsed = parseNote(text);
                noteContent.textContent = parsed.body;
                currentMeta = parsed.meta;
                currentTopic = topic;
                currentFile = file;

                noteEditor.style.display = "none";
                noteContent.style.display = "block";
                modeLabel.innerText = "👁";
            });
    }

    function startEdit() {
        if (!currentFile) return alert("Выбери заметку");

        const parsed = parseNote(rawNote);

        modeLabel.innerText = "✏️";
        editText.value = parsed.body;
        noteContent.style.display = "none";
        noteEditor.style.display = "flex";
    }

    function cancelEdit() {
        modeLabel.innerText = "👁";
        noteEditor.style.display = "none";
        noteContent.style.display = "block";
    }

    function saveEdit() {
        const newBody = editText.value;

        const fullNote = buildNote(currentMeta || {}, newBody);

        api(`/notes/update?user=${user}&topic=${currentTopic}&file=${currentFile}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: fullNote
        }).then(() => {
            rawNote = fullNote;
            const parsed = parseNote(fullNote);
            noteContent.innerText = parsed.body;
            currentMeta = parsed.meta;

            noteEditor.style.display = "none";
            noteContent.style.display = "block";

            modeLabel.innerText = "👁";

            showToast();
        });
    }

    function deleteNote() {
        settingsMenu.style.display = "none";
        deleteModal.style.display = "flex";
    }

    function confirmDelete() {
        if (deleteConfirmInput.value !== "удалить") return;

        api(`/notes/delete?user=${user}&topic=${currentTopic}&file=${currentFile}`, {
            method: "DELETE"
        }).then(() => {
            deleteModal.style.display = "none";
            noteContent.innerText = "Выберите заметку";
            currentFile = null;
            currentTopic = null;
            currentMeta = null;
            rawNote = null;

            loadTopics();
        });
    }

    function renameCurrentNote() {
        const newName = prompt("Новое имя:");
        if (!newName) return;

        api("/notes/rename", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({
                user,
                topic: currentTopic,
                oldName: currentFile,
                newTitle: newName
            })
        }).then(() => {
            currentFile = newName;
            loadTopics();
            settingsMenu.style.display = "none";
            return loadNote(currentTopic, newName);
            });
    }

    function renameTopic() {
        const newName = prompt("Новое имя папки:", currentTopic);
        if (!newName) return;

        api("/notes/rename-topic", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({
                user,
                oldTopic: currentTopic,
                newTopic: newName
            })
        }).then(() => {
            currentTopic = newName;
            loadTopics();
            settingsMenu.style.display = "none";
            return loadNote(currentTopic, currentFile);
        });
    }

    document.addEventListener("click", (e) => {
        if (settingsMenu && !settingsMenu.contains(e.target)) {
            settingsMenu.style.display = "none";
        }
    });

    function showModal() { modal.style.display = "flex"; }
    function hideModal() { modal.style.display = "none"; }

    function save() {
        api("/notes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user,
                topic: topic.value,
                title: title.value,
                text: text.value,
                tags: tags.value ? tags.value.split(",") : []
            })
        }).then(() => {
            hideModal();
            loadTopics();
            showToast();
        });
    }

     function showPage(page) {
            document.querySelectorAll(".page").forEach(p => p.style.display = "none");
            if (page === "home") homePage.style.display = "block";
            if (page === "notes") notesPage.style.display = "block";
            if (page === "tasks") tasksPage.style.display = "block";
        }

        function showToast() {
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 2000);
        }

        function parseNote(text) {
    if (!text.startsWith('---')) {
        return { meta: {}, body: text };
    }

    const parts = text.split('---');

    if (parts.length < 3) {
        return { meta: {}, body: text };
    }

    const metaRaw = parts[1].trim();
    const body = parts.slice(2).join('---').trim();

    const meta = {};

    metaRaw.split('\n').forEach(line => {
        const [key, ...rest] = line.split(':');
        if (!key) return;
        meta[key.trim()] = rest.join(':').trim();
    });

    return { meta, body };
}

    function buildNote(meta, body) {
    return `---
title: ${meta.title || ""}
created: ${meta.created || ""}
tags: ${Array.isArray(meta.tags) ? meta.tags.join(", ") : (meta.tags || "")}
---

${body}`;
}

    function toggleSettings(e) {
        e.stopPropagation();

        if (!currentFile) return alert("Сначала выбери заметку");

        settingsMenu.style.display =
            settingsMenu.style.display === "block" ? "none" : "block";
    }

</script>

</body>
</html>
