<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; font-family:sans-serif; background:#f5f6f7; }

        button {
            padding:10px;
            border:none;
            border-radius:8px;
            background:#3498db;
            color:white;
            margin:2px;
        }

        #deleteBtn { background:#e74c3c; }

        #topBar {
            display:flex;
            justify-content:space-between;
            padding:10px;
        }

        #treeContainer {
            position:fixed;
            left:-260px;
            top:0;
            width:250px;
            height:100%;
            background:white;
            padding:10px;
            transition:0.3s;
            z-index:1000;
            overflow:auto;
        }
        #treeContainer.open { left:0; }

        #overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.3);
            display:none;
        }
        #overlay.open { display:block; }

        #noteContent {
            background:white;
            padding:12px;
            border-radius:10px;
            min-height:200px;
        }

        #noteEditor { display:none; flex-direction:column; }

        textarea, input {
            width:100%;
            font-size:16px;
            margin-top:6px;
        }

        #modal, #deleteModal {
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.5);
            justify-content:center;
            align-items:center;
        }

        #modalContent, #deleteModal div {
            background:white;
            padding:20px;
            width:90%;
            max-width:400px;
            border-radius:10px;
        }

        #toast {
            display:none;
            position:fixed;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            background:#2ecc71;
            color:white;
            padding:10px;
            border-radius:20px;
        }
    </style>
</head>

<body>

<div id="topBar">
    <button onclick="toggleTree()">☰</button>
    <h3>Мои заметки</h3>
    <button onclick="showModal()">➕</button>
</div>

<!-- SEARCH -->
<div style="padding:10px; display:flex; gap:5px;">
    <input id="searchText" placeholder="поиск по тексту">
    <input id="searchTag" placeholder="поиск по тегу">
    <button onclick="searchNotes()">Поиск</button>
    <button onclick="loadTopics()">Сброс</button>
</div>

<div id="overlay" onclick="closeTree()"></div>

<div style="padding:10px">
    <div id="treeContainer">
        <h4>Топики</h4>
        <ul id="treeList"></ul>
    </div>

    <div id="noteContent">Выберите заметку</div>

    <div id="noteEditor">
        <textarea id="editText"></textarea>
        <button onclick="saveEdit()">Сохранить</button>
        <button onclick="cancelEdit()">Отмена</button>
    </div>

    <div>
        <button id="editBtn" style="display:none" onclick="startEdit()">Редактировать</button>
        <button id="renameBtn" style="display:none" onclick="renameCurrentNote()">Переименовать</button>
        <button id="deleteBtn" style="display:none" onclick="deleteNote()">Удалить</button>
    </div>
</div>

<!-- modal -->
<div id="modal">
    <div id="modalContent">
        <h3>Новая заметка</h3>
        <input id="topic" list="topics" placeholder="topic">
        <datalist id="topics"></datalist>
        <input id="title" placeholder="title">
        <textarea id="text" placeholder="text"></textarea>
        <button onclick="save()">Сохранить</button>
        <button onclick="hideModal()">Отмена</button>
    </div>
</div>

<div id="deleteModal">
    <div>
        <p>Введите "удалить"</p>
        <input id="deleteConfirmInput">
        <button onclick="confirmDelete()">OK</button>
    </div>
</div>

<div id="toast">OK</div>

<script>
    const treeContainer = document.getElementById("treeContainer");
    const overlay = document.getElementById("overlay");
    const treeList = document.getElementById("treeList");
    const noteContent = document.getElementById("noteContent");
    const noteEditor = document.getElementById("noteEditor");
    const editText = document.getElementById("editText");
    const editBtn = document.getElementById("editBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const renameBtn = document.getElementById("renameBtn");
    const modal = document.getElementById("modal");
    const topic = document.getElementById("topic");
    const title = document.getElementById("title");
    const text = document.getElementById("text");
    const topics = document.getElementById("topics");
    const toast = document.getElementById("toast");
    const deleteModal = document.getElementById("deleteModal");
    const deleteConfirmInput = document.getElementById("deleteConfirmInput");

    function api(url, options = {}) {
        return fetch(url, {
            ...options,
            headers: {
                "X-API-KEY": "123",
                ...(options.headers || {})
            }
        });
    }

    let user, currentTopic, currentFile;

    window.onload = () => {
        user = localStorage.getItem("user") || prompt("Введите имя:");
        localStorage.setItem("user", user);

        api('/user/set?user=' + user, { method: 'POST' });
        loadTopics();
    };

    function toggleTree() {
        treeContainer.classList.toggle("open");
        overlay.classList.toggle("open");
    }
    function closeTree() {
        treeContainer.classList.remove("open");
        overlay.classList.remove("open");
    }
    function showToast() {
        toast.style.display = "block";
        setTimeout(() => toast.style.display = "none", 2000);
    }

    function showModal() { modal.style.display = "flex"; }
    function hideModal() { modal.style.display = "none"; }

    function loadTopics() {
        api('/notes/tree?user=' + user)
            .then(r => r.json())
            .then(tree => {
                treeList.innerHTML = "";
                topics.innerHTML = "";

                Object.entries(tree).forEach(([topicName, files]) => {
                    const option = document.createElement("option");
                    option.value = topicName;
                    topics.appendChild(option);

                    const li = document.createElement("li");
                    li.innerText = topicName;

                    const ul = document.createElement("ul");

                    files.forEach(file => {
                        const f = document.createElement("li");
                        f.innerText = file;
                        f.onclick = () => loadNote(topicName, file);
                        ul.appendChild(f);
                    });

                    li.appendChild(ul);
                    treeList.appendChild(li);
                });
            });
    }

    function loadNote(topic, file) {
        api(`/notes/content?user=${user}&topic=${topic}&file=${file}`)
            .then(r => r.text())
            .then(full => {
                const parts = full.split("---");
                const textOnly = parts.length >= 3 ? parts[2].trim() : full;

                noteContent.innerText = textOnly;

                currentTopic = topic;
                currentFile = file;

                editBtn.style.display = "inline-block";
                deleteBtn.style.display = "inline-block";
                renameBtn.style.display = "inline-block";
            });
    }

    function searchNotes() {
        const q = document.getElementById("searchText").value;
        const tag = document.getElementById("searchTag").value;

        let url = `/notes/search?user=${user}`;
        if (q) url += `&q=${encodeURIComponent(q)}`;
        if (tag) url += `&tag=${encodeURIComponent(tag)}`;

        api(url)
            .then(r => r.json())
            .then(files => {
                treeList.innerHTML = "";

                const ul = document.createElement("ul");

                files.forEach(full => {
                    const [topic, file] = full.split("/");

                    const li = document.createElement("li");
                    li.innerText = file;
                    li.onclick = () => loadNote(topic, file);

                    ul.appendChild(li);
                });

                treeList.appendChild(ul);
            });
    }

    function save() {
        api("/notes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user,
                topic: topic.value,
                title: title.value,
                text: text.value
            })
        }).then(() => {
            showToast();
            hideModal();
            loadTopics();
        });
    }

    function startEdit() {
        editText.value = noteContent.innerText;
        noteEditor.style.display = "flex";
    }
    function cancelEdit() {
        noteEditor.style.display = "none";
    }
    function saveEdit() {
        api(`/notes/update?user=${user}&topic=${currentTopic}&file=${currentFile}`, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: editText.value
        }).then(() => {
            noteContent.innerText = editText.value;
            cancelEdit();
            showToast();
        });
    }

    function deleteNote() {
        deleteModal.style.display = "flex";
    }
    function confirmDelete() {
        if (deleteConfirmInput.value !== "удалить") return;

        api(`/notes/delete?user=${user}&topic=${currentTopic}&file=${currentFile}`, {
            method: "DELETE"
        }).then(() => {
            noteContent.innerText = "Выберите заметку";
            editBtn.style.display = "none";
            deleteBtn.style.display = "none";
            renameBtn.style.display = "none";
            deleteModal.style.display = "none";
            showToast();
            loadTopics();
        });
    }
</script>

</body>
</html>
